app = 'tmdb-embed-api'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# Movimos el destino a /config para no tapar los archivos de /app/utils
[mounts]
  source = "tmdb_data"
  destination = "/config"

# Le indicamos a la API que guarde y lea el JSON desde la nueva ruta persistente
[env]
  CONFIG_PATH = "/config/user-config.json"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
